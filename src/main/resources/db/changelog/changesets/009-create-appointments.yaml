databaseChangeLog:
  - changeSet:
      id: 009-create-appointments
      author: safoev
      changes:
        - createTable:
            tableName: appointments
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: client_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: master_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: service_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: company_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: appointment_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: client_phone
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: client_name
                  type: VARCHAR(255)
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: BOOKED
                  constraints:
                    nullable: false
              - column:
                  name: cancel_reason
                  type: VARCHAR(255)
              - column:
                  name: price
                  type: DECIMAL(10, 2)
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: appointments
            baseColumnNames: client_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_appointments_client
        - addForeignKeyConstraint:
            baseTableName: appointments
            baseColumnNames: master_id
            referencedTableName: masters
            referencedColumnNames: id
            constraintName: fk_appointments_master
        - addForeignKeyConstraint:
            baseTableName: appointments
            baseColumnNames: service_id
            referencedTableName: services
            referencedColumnNames: id
            constraintName: fk_appointments_service
        - addForeignKeyConstraint:
            baseTableName: appointments
            baseColumnNames: company_id
            referencedTableName: companies
            referencedColumnNames: id
            constraintName: fk_appointments_company
