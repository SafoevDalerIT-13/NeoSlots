databaseChangeLog:
  - changeSet:
      id: 010-create-reminders
      author: safoev
      changes:
        - createTable:
            tableName: reminders
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: appointment_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: scheduled_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: sent_at
                  type: TIMESTAMP
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: reminders
            baseColumnNames: appointment_id
            referencedTableName: appointments
            referencedColumnNames: id
            constraintName: fk_reminders_appointment
