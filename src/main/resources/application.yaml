spring:
  application:
    name: NeoSlots
  datasource:
    url: jdbc:postgresql://localhost:5432/NeoSlots
    username: postgres
    password: 233122
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.yaml
    drop-first: false

server:
  port: 8080
